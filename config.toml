# Talk Machine Fury � Runtime Configuration
# Generated by docs/phase0_checks.py � do not edit manually.
# To change threading, re-run the benchmark in phase0_checks.py.

[vad]
threshold = 0.40
min_silence_ms = 450
max_speech_s = 10.0
# threshold=0.40: FNR (dropped speech) costs more than FPR (noise transcribed)
# Changing threshold requires a counted measurement, not a judgment call.
# max_speech_s=10: limits segment length to keep ASR latency under ~2s.

[inference]
intra_op_num_threads = 2
inter_op_num_threads = 1
# Value determined by threading benchmark in Gate 0D.
# Changing requires a new benchmark run.

[models]
russian = "gigaam-v3-e2e-ctc"
# gigaam_v3 = use onnx-asr
# vosk:... = use sherpa-onnx

[audio]
target_sample_rate = 16000
hardware_sample_rate = 48000   # confirmed by Gate 0B on target machine
# Ratio = 3:1 (exact integer) — lerp downsampler in worklet.js has zero aliasing

[server]
host = "localhost"
port = 8765
queue_maxsize = 600  # ~20s buffer — headroom for ASR inference on 10s segments
