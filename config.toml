# Talk Machine Fury � Runtime Configuration
# Generated by docs/phase0_checks.py � do not edit manually.
# To change threading, re-run the benchmark in phase0_checks.py.

[vad]
threshold = 0.40
min_silence_ms = 1000
min_speech_ms = 500
max_speech_s = 25.0
# threshold=0.40: FNR (dropped speech) costs more than FPR (noise transcribed)
# min_silence_ms=1000: Russian meeting speech has natural pauses ~0.5-1s mid-sentence;
#   450ms was cutting mid-phrase. 1000ms waits for a real sentence boundary.
# min_speech_ms=500: segments shorter than 0.5s are skipped — whisper hallucinates
#   on sub-second clips (produces "Да.", "Ну.", fused words at boundaries).
# max_speech_s=25: longer segments give whisper more context → better accuracy.

[inference]
intra_op_num_threads = 2
inter_op_num_threads = 1
# Value determined by threading benchmark in Gate 0D.
# Changing requires a new benchmark run.

[models]
russian = "whisper:medium"
# whisper:<size> = faster-whisper multilingual, lang=ru, beam=5 (medium: 18.8% WER)
# gigaam-v3-e2e-ctc  = onnx-asr CTC (~24% WER, faster)
# gigaam-v3-e2e-rnnt = onnx-asr RNN-T (~21% WER)
# vosk:...           = sherpa-onnx fallback

[audio]
target_sample_rate = 16000
hardware_sample_rate = 48000   # confirmed by Gate 0B on target machine
# Ratio = 3:1 (exact integer) — lerp downsampler in worklet.js has zero aliasing

[server]
host = "localhost"
port = 8765
queue_maxsize = 600  # ~20s buffer — headroom for ASR inference on 10s segments
transcript_folder = "C:/Transcripts"
