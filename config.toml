# Talk Machine Fury � Runtime Configuration
# Generated by docs/phase0_checks.py � do not edit manually.
# To change threading, re-run the benchmark in phase0_checks.py.

[vad]
threshold = 0.25
min_silence_ms = 1000
min_speech_ms = 500
min_rms = 0.02
max_speech_s = 25.0
# threshold=0.25: calibrated for post-normalization RMS ~0.10.
# min_silence_ms=1000: Russian meeting speech has natural pauses ~0.5-1s mid-sentence;
#   450ms was cutting mid-phrase. 1000ms waits for a real sentence boundary.
# min_speech_ms=500: whisper:small is fast enough (RTF ~0.09) that short segments
#   don't back up the queue — no need to filter aggressively.
# max_speech_s=25: longer segments give whisper more context → better accuracy.

[inference]
intra_op_num_threads = 2
inter_op_num_threads = 1
# Value determined by threading benchmark in Gate 0D.
# Changing requires a new benchmark run.

[models]
russian = "whisper:small"
# whisper:<size> = faster-whisper multilingual, lang=ru, beam=5 (medium: 18.8% WER)
# gigaam-v3-e2e-ctc  = onnx-asr CTC (~24% WER, faster)
# gigaam-v3-e2e-rnnt = onnx-asr RNN-T (~21% WER)
# vosk:...           = sherpa-onnx fallback

[audio]
target_sample_rate = 16000
hardware_sample_rate = 48000   # confirmed by Gate 0B on target machine
target_rms = 0.10
# Adaptive normalization target. Tab audio RMS varies 0.02-0.12 between sessions;
# a fixed gain cannot compensate. Each 512-sample frame is normalized to this RMS
# before Silero VAD ingestion, making threshold behaviour level-independent.
# 0.10 is the empirically confirmed range where Silero threshold=0.25 works correctly.
rms_floor = 0.01
# Frames with raw RMS below this value skip normalization entirely (they are silence
# or background noise, not speech). Prevents noise amplification on quiet frames.
# 0.01 is correct: actual speech frames are RMS 0.04-0.20. Frames below 0.01 are
# mic noise, DTX comfort noise, or silence — amplifying them 7-21x corrupts VAD.

[server]
host = "localhost"
port = 8765
queue_maxsize = 600  # ~20s buffer — headroom for ASR inference on 10s segments
transcript_folder = "C:/Transcripts"
