<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Talk Machine Fury</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e8e8e8;
      display: flex;
      flex-direction: column;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid #333;
    }

    #title {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.02em;
      flex: 1;
    }

    #lang-select {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e8e8e8;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    #lang-select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status-bar {
      padding: 6px 12px;
      font-size: 11px;
      color: #888;
      min-height: 24px;
      border-bottom: 1px solid #2a2a2a;
    }

    #status-bar.error   { color: #ff6b6b; }
    #status-bar.active  { color: #4caf50; }
    #status-bar.warning { color: #ffa726; }

    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      min-height: 120px;
      max-height: 300px;
      line-height: 1.5;
      word-break: break-word;
    }

    #transcript .line {
      padding: 2px 0;
      color: #d0d0d0;
    }

    #transcript .placeholder {
      color: #555;
      font-style: italic;
    }

    #controls {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid #333;
    }

    button {
      flex: 1;
      padding: 7px 12px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-start {
      background: #2e7d32;
      color: #fff;
    }

    #btn-start:hover:not(:disabled) { background: #388e3c; }

    #btn-stop {
      background: #c62828;
      color: #fff;
    }

    #btn-stop:hover:not(:disabled) { background: #d32f2f; }

    #btn-save {
      background: #1565c0;
      color: #fff;
    }

    #btn-save:hover:not(:disabled) { background: #1976d2; }
  </style>
</head>
<body>
  <div id="header">
    <span id="title">Talk Machine Fury</span>
    <select id="lang-select">
      <option value="ru">RU</option>
      <option value="en">EN</option>
    </select>
  </div>

  <div id="status-bar">Checking server...</div>

  <div id="transcript">
    <div class="placeholder">Transcript will appear here.</div>
  </div>

  <div id="controls">
    <button id="btn-start" disabled>Start</button>
    <button id="btn-stop" disabled>Stop</button>
    <button id="btn-save" disabled>Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
